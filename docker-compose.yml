version: '3.8'

services:
  bot:
    build: .
    container_name: football-prediction-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist SQLite database outside the container
      - bot-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
